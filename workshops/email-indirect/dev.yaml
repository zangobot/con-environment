apiVersion: v1
kind: Pod
metadata:
  name: email-client-dev
  namespace: default
  labels:
    app: email-client
spec:
  containers:
    - name: client
      image: workshop-email-indirect-user
      imagePullPolicy: Always
      ports:
        - containerPort: 5000
        - containerPort: 25
      env:
        - name: CHALLENGE_SERVER_HOST
          value: "email-service"
        - name: CHALLENGE_SERVER_PORT
          value: "2525"
        - name: MY_LISTEN_PORT
          value: "25"
        - name: WEB_PORT
          value: "5000"
      resources:
        requests:
          memory: "512Mi"
          cpu: "500m"
        limits:
          memory: "1Gi"
          cpu: "1500m"
---
apiVersion: v1
kind: Service
metadata:
  name: email-client-dev
  namespace: default
spec:
  type: NodePort
  selector:
    app: email-client
  ports:
    - name: web
      port: 5000
      targetPort: 5000
      nodePort: 30050
    - name: smtp
      port: 25
      targetPort: 25
---
# ============================================================================
# Challenge Service (LLM Bot)
# ============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: email-service
  namespace: default
  labels:
    app: email-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: email-service
  template:
    metadata:
      labels:
        app: email-service
    spec:
      containers:
        - name: service
          image: workshop-email-indirect-service
          imagePullPolicy: Always
          ports:
            - containerPort: 2525
          env:
            - name: LISTEN_PORT
              value: "2525"
            # Assumes the local environment provides this LLM endpoint
            - name: VLLM_URL
              value: "http://llm-services.local/v1/chat/completions"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: email-service
  namespace: default
spec:
  selector:
    app: email-service
  ports:
    - protocol: TCP
      port: 2525
      targetPort: 2525