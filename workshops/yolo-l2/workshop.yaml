apiVersion: v1
kind: Namespace
metadata:
  name: yolo-l2
---
# ============================================================================
# 1. RBAC for the Hub
# ============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: workshop-hub
  namespace: yolo-l2
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: workshop-hub-manager
  namespace: yolo-l2
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "secrets"]
    verbs: ["get", "list", "watch", "create", "delete", "patch", "update"]
  - apiGroups: [""]
    resources: ["pods/status"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: workshop-hub-binding
  namespace: yolo-l2
subjects:
  - kind: ServiceAccount
    name: workshop-hub
    namespace: yolo-l2
roleRef:
  kind: Role
  name: workshop-hub-manager
  apiGroup: rbac.authorization.k8s.io
---
# ============================================================================
# 2. Verification Service (Challenge Server)
# ============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: challenge-server
  namespace: yolo-l2
  labels:
    app: challenge-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: challenge-server
  template:
    metadata:
      labels:
        app: challenge-server
    spec:
      containers:
        - name: verification
          image: ghcr.io/nbhdai/workshop-yolo-l2-verification:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: L2_THRESHOLD
              value: "50.0"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: challenge-server
  namespace: yolo-l2
spec:
  selector:
    app: challenge-server
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
---
# ============================================================================
# 3. Workshop Hub
# ============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: workshop-hub
  namespace: yolo-l2
  labels:
    app: workshop-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: workshop-hub
  template:
    metadata:
      labels:
        app: workshop-hub
    spec:
      serviceAccountName: workshop-hub
      containers:
        - name: hub
          image: ghcr.io/nbhdai/workshop-hub:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: HUB_WORKSHOP_NAMESPACE
              value: "yolo-l2"
            - name: HUB_WORKSHOP_NAME
              value: "yolo-l2"
            - name: HUB_WORKSHOP_IMAGE
              value: "ghcr.io/nbhdai/workshop-yolo-l2-notebook:latest"
            - name: HUB_WORKSHOP_PORT
              value: "8888" 
            - name: HUB_WORKSHOP_POD_LIMIT
              value: "20"
            - name: HUB_WORKSHOP_IDLE_SECONDS
              value: "1800"
            - name: RUST_LOG
              value: "info,hub=debug"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: workshop-hub
  namespace: yolo-l2
spec:
  type: NodePort
  selector:
    app: workshop-hub
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30080