apiVersion: v1
kind: Pod
metadata:
  name: yolo-notebook-dev
  namespace: default
  labels:
    app: yolo-notebook
spec:
  containers:
    - name: notebook
      image: workshop-yolo-l2-notebook
      imagePullPolicy: Always
      ports:
        - containerPort: 8888
      resources:
        limits:
          memory: "2Gi"
          cpu: "4"
        requests:
          memory: "1Gi"
          cpu: "2"
---
apiVersion: v1
kind: Service
metadata:
  name: yolo-notebook-dev
  namespace: default
spec:
  type: NodePort
  selector:
    app: yolo-notebook
  ports:
    - port: 8888
      targetPort: 8888
      nodePort: 30888
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: challenge-server
  namespace: default
  labels:
    app: challenge-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: challenge-server
  template:
    metadata:
      labels:
        app: challenge-server
    spec:
      containers:
        - name: verification
          image: workshop-yolo-l2-verification
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: L2_THRESHOLD
              value: "50.0"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: challenge-server
  namespace: default
spec:
  selector:
    app: challenge-server
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000